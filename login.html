<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ACKS</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/animation.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .page-login {
      --color-bg: #0d1117;
    }

    #login-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }

    #login-section::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(71,34,44,0.45) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(22, 27, 39, 0.85);
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      padding: 3rem 2.5rem;
      animation: cardReveal 0.6s ease both;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .login-logo img {
      height: 52px;
      width: auto;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 2rem;
    }

    .auth-tab {
      padding: 0.65rem;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8892a4;
      cursor: pointer;
      border: none;
      background: none;
      font-family: Georgia, 'Times New Roman', serif;
      transition: color 0.2s, background 0.2s;
    }

    .auth-tab.active {
      background: #47222c;
      color: #ffffff;
    }

    .auth-tab:hover:not(.active) {
      color: #e0e0e0;
      background: rgba(71,34,44,0.2);
    }

    .auth-form {
      display: none;
      flex-direction: column;
      gap: 1.2rem;
    }

    .auth-form.active {
      display: flex;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8892a4;
    }

    .form-group input {
      background: rgba(13,17,23,0.8);
      border: 1px solid #3a4150;
      color: #e0e0e0;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .form-group input::placeholder {
      color: #3a4150;
    }

    .form-group input:focus {
      border-color: #47222c;
      box-shadow: 0 0 0 2px rgba(71,34,44,0.25);
    }

    .btn-auth {
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: #47222c;
      border: 1px solid #47222c;
      color: #e0e0e0;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      width: 100%;
    }

    .btn-auth:hover {
      background: transparent;
      color: #e0e0e0;
    }

    .forgot-link {
      font-size: 0.72rem;
      color: #8892a4;
      text-align: right;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .forgot-link:hover { color: #00d4ff; }

    .card-corner {
      position: absolute;
      width: 16px;
      height: 16px;
    }

    .card-corner--tl { top: -1px; left: -1px; border-top: 2px solid #47222c; border-left: 2px solid #47222c; }
    .card-corner--tr { top: -1px; right: -1px; border-top: 2px solid #47222c; border-right: 2px solid #47222c; }
    .card-corner--bl { bottom: -1px; left: -1px; border-bottom: 2px solid #47222c; border-left: 2px solid #47222c; }
    .card-corner--br { bottom: -1px; right: -1px; border-bottom: 2px solid #47222c; border-right: 2px solid #47222c; }

    .login-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: #3a4150;
    }

    .login-footer a {
      color: #8892a4;
      text-decoration: none;
      transition: color 0.2s;
    }

    .login-footer a:hover { color: #ffffff; }
  </style>
</head>
<body class="page-login">

  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <img src="akcslogo.png" alt="ACKS" class="nav-logo-img" />
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <section id="login-section">
    <div class="login-card">
      <div class="card-corner card-corner--tl"></div>
      <div class="card-corner card-corner--tr"></div>
      <div class="card-corner card-corner--bl"></div>
      <div class="card-corner card-corner--br"></div>

      <div class="login-logo">
        <img src="akcslogo.png" alt="ACKS" />
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
      </div>

      <form class="auth-form active" id="form-login" onsubmit="return false;">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@email.com" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
        <button class="btn-auth" type="submit">Sign In</button>
      </form>

      <form class="auth-form" id="form-register" onsubmit="return false;">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@email.com" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="••••••••" />
        </div>
        <button class="btn-auth" type="submit">Create Account</button>
      </form>

      <div class="login-footer">
        <a href="index.html">← Back to homepage</a>
      </div>
    </div>
  </section>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('form-login').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('form-register').classList.add('active');
      }
    }
  </script>

</body>
</html>
