<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ACKS</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/animation.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .page-login {
      --color-bg: #0d1117;
    }

    #login-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }

    #login-section::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(71,34,44,0.45) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(22, 27, 39, 0.85);
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      padding: 3rem 2.5rem;
      animation: cardReveal 0.6s ease both;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .login-logo img {
      height: 52px;
      width: auto;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 2rem;
    }

    .auth-tab {
      padding: 0.65rem;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8892a4;
      cursor: pointer;
      border: none;
      background: none;
      font-family: Georgia, 'Times New Roman', serif;
      transition: color 0.2s, background 0.2s;
    }

    .auth-tab.active {
      background: #47222c;
      color: #ffffff;
    }

    .auth-tab:hover:not(.active) {
      color: #e0e0e0;
      background: rgba(71,34,44,0.2);
    }

    .auth-form {
      display: none;
      flex-direction: column;
      gap: 1.2rem;
    }
